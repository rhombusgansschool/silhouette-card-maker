name: Run Tests (PR & Push)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-core:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run core tests
        run: pytest -v -m "not integration and not slow" test/test_utilities.py test/test_create_pdf.py

  detect-plugin-changes:
    runs-on: ubuntu-latest
    outputs:
      test_files: ${{ steps.detect.outputs.test_files }}
      has_tests: ${{ steps.detect.outputs.has_tests }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          declare -A SEEN
          TEST_FILES=()

          while IFS= read -r file; do
            if [[ "$file" == plugins/* ]]; then
              plugin=$(echo "$file" | cut -d/ -f2)
              test_file="test/test_${plugin}_plugin.py"
              if [[ -f "$test_file" && -z "${SEEN[$test_file]}" ]]; then
                TEST_FILES+=("$test_file")
                SEEN["$test_file"]=1
              fi
            fi
          done <<< "$CHANGED"

          if [[ ${#TEST_FILES[@]} -gt 0 ]]; then
            echo "test_files=${TEST_FILES[*]}" >> "$GITHUB_OUTPUT"
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_files=" >> "$GITHUB_OUTPUT"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

  test-plugins:
    needs: detect-plugin-changes
    if: needs.detect-plugin-changes.outputs.has_tests == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run changed plugin tests
        run: pytest -v -m "not integration and not slow" ${{ needs.detect-plugin-changes.outputs.test_files }}
